<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FMU - CRUD</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background-color: #1c0033;
      color: #fff;
      padding: 2rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: bold;
    }

    .profile-icon {
      background-color: white;
      cursor: pointer;
      color: #1c0033;
      border-radius: 50%;
      padding: 0.6rem;
      font-size: 1.2rem;
    }

    .simulacao-btn a {
      display: block;
      background-color: #00a000;
      color: white;
      text-align: center;
      padding: 1rem;
      border-radius: 10px;
      font-weight: 500;
      margin-bottom: 1rem;
      text-decoration: none;
      transition: background-color 0.3s;
    }

    .simulacao-btn a:hover {
      background-color: #008000;
    }

    .search-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      align-items: stretch;
    }

    .search-bar input {
      flex: 1;
      padding: 0.8rem 1rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
    }

    .filter-select {
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 10px;
      background-color: #eee;
      color: #333;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      outline: none;
      transition: background-color 0.2s;
      -webkit-appearance: none; 
      -moz-appearance: none;
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M1 3l4 4 4-4' stroke='%23333' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 12px center;
      padding-right: 35px; 
    }

    .filter-select:hover {
      background-color: #ddd;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #f5f5f5;
      border-radius: 1rem;
      color: #333;
    }

    tbody {
      display: table-row-group;
    }
    
    tbody::after {
      content: '';
      display: table-row;
      height: 60px; 
    }

    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid #ccc;
    }

    thead {
      background-color: #eaeaea;
    }

    th:first-child { border-top-left-radius: 1rem; }
    th:last-child { border-top-right-radius: 1rem; }

    .options {
      cursor: pointer;
      font-size: 1.5rem;
      position: relative;
    }

    .crud-menu {
      display: none;
      position: absolute;
      top: 30px;
      right: 0;
      background-color: white;
      color: #1c0033;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
      z-index: 100;
    }

    .crud-menu button {
      display: block;
      padding: 0.5rem 1rem;
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .crud-menu button:hover {
      background-color: #eee;
    }
  </style>
</head>
<body>
  <header>
    <h1>FMU</h1>
    <div class="profile-icon">👤</div>
  </header>

  <div class="simulacao-btn">
    <a href="ProjetoDevWeb/simulador.html">Faça uma simulação agora!</a>
  </div>

  <div class="search-bar">
    <select class="filter-select" id="date-filter-select">
      <option value="todas">Filtro ⌄</option>
    </select>
    <input type="text" id="search-input" placeholder="Procure a análise que você fez" />
  </div>

  <table>
    <thead>
      <tr>
        <th>Data</th>
        <th>Hora</th>
        <th>Renda</th>
        <th>Valor Recebido</th>
        <th>Valor Final</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="table-body">
      <tr>
        <td>15/01/25</td>
        <td>9:30hs</td>
        <td>Contrato</td>
        <td>R$ 1.500</td>
        <td>R$ 200 de investimento</td>
        <td>
          <div class="options">⋮
            <div class="crud-menu">
              <button class="edit-btn">Editar</button>
              <button class="delete-btn">Deletar</button>
            </div>
          </div>
        </td>
      </tr>
      <tr>
        <td>15/01/25</td>
        <td>9:30hs</td>
        <td>CLT</td>
        <td>R$ 5.000</td>
        <td>R$ 500 de investimento</td>
        <td>
          <div class="options">⋮
            <div class="crud-menu">
              <button class="edit-btn">Editar</button>
              <button class="delete-btn">Deletar</button>
            </div>
          </div>
        </td>
      </tr>
    </tbody>
  </table>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const dateSelect = document.getElementById('date-filter-select');
      const searchInput = document.getElementById('search-input');

      atualizarOpcoesDeFiltro();

      function atualizarOpcoesDeFiltro() {
        const valorSelecionadoAntes = dateSelect.value || 'todas';
        const linhas = document.querySelectorAll('#table-body tr');
        const datasEncontradas = new Set();

        linhas.forEach(linha => {
          const primeiraCelula = linha.querySelector('td');
          if (primeiraCelula) {
            const dataTexto = primeiraCelula.innerText.trim();
            if (dataTexto) datasEncontradas.add(dataTexto);
          }
        });

        let optionsHTML = `<option value="todas">Todas as datas</option>`;
        datasEncontradas.forEach(data => {
          optionsHTML += `<option value="${data}">${data}</option>`;
        });

        dateSelect.innerHTML = optionsHTML;
        
        if (datasEncontradas.has(valorSelecionadoAntes)) {
          dateSelect.value = valorSelecionadoAntes;
        } else {
          dateSelect.value = 'todas';
        }
      }

      dateSelect.addEventListener('change', filtrarTabela);
      searchInput.addEventListener('input', filtrarTabela);

      function filtrarTabela() {
        const filtroAtual = dateSelect.value;
        const textoBusca = searchInput.value.toLowerCase();
        const linhas = document.querySelectorAll('#table-body tr');

        linhas.forEach(linha => {
          if (!linha.querySelector('td')) return; 

          const textoDaLinha = ReadTextoLinhaCompleta(linha);
          const colunaData = linha.querySelectorAll('td')[0].innerText.trim();

          const bateData = (filtroAtual === 'todas' || colunaData === filtroAtual);
          const bateTexto = textoDaLinha.includes(textoBusca);

          if (bateData && bateTexto) {
            linha.style.display = '';
          } else {
            linha.style.display = 'none';
          }
        });
      }

      function ReadTextoLinhaCompleta(linha) {
        let texto = '';
        const celulas = Array.from(linha.querySelectorAll('td'));
        const celulasValidas = celulas.slice(0, celulas.length - 1);
        celulasValidas.forEach(celula => texto += celula.innerText + ' ');
        return texto.toLowerCase();
      }

      configurarEventosCrud();

      function configurarEventosCrud() {
        document.querySelectorAll('.options').forEach(option => {
          option.onclick = function(e) {
            e.stopPropagation();
            document.querySelectorAll('.crud-menu').forEach(menu => {
              if(menu !== option.querySelector('.crud-menu')) {
                menu.style.display = 'none';
              }
            });
            const menu = option.querySelector('.crud-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
          };
        });
      }

      document.addEventListener('click', () => {
        document.querySelectorAll('.crud-menu').forEach(menu => menu.style.display = 'none');
      });

      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.onclick = function(e) {
          e.stopPropagation();
          const row = btn.closest('tr');
          row.remove();
          atualizarOpcoesDeFiltro();
          filtrarTabela();
        };
      });

      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.onclick = function(e) {
          e.stopPropagation();
          const row = btn.closest('tr');
          const cells = row.querySelectorAll('td');
          for(let i = 0; i < cells.length - 1; i++) {
            const current = cells[i].innerText;
            const input = prompt(`Editar valor:`, current);
            if(input !== null && input.trim() !== '') {
              cells[i].innerText = input;
            }
          }
          atualizarOpcoesDeFiltro();
          filtrarTabela();
        };
      });
    });
  </script>
</body>
</html>
