<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rendas</title>
    <link rel="stylesheet" href="CSS/EstiloRendas.css?v=3">
  </head>
  <body>
    <div class="centro">
      <h1>RENDAS</h1>
      <p class="frase">
        Informe o valor do seu salário bruto que o simulador calculará o desconto no
        INSS (caso seja aplicável).<br />
        Outras rendas, como freelancers, bicos, comissão etc (caso haja).
      </p>

      <div class="option">
        <div class="input-box">
          <h2>Salário Bruto</h2>
          <input type="text" id="salario" class="caixa" placeholder="R$ 0,00" oninput="formatarMoeda(this)">
        </div>
        <div class="input-box">
          <h2>Outras Rendas</h2>
          <input type="text" id="outras" class="caixa" placeholder="R$ 0,00" oninput="formatarMoeda(this)">
        </div>
      </div>
      
      <button class="botao" onclick="salvarRenda()">CONTINUAR</button>
    </div>
    
    <script src="JS/Renda.js?v=5"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        
        const dadosSalvos = localStorage.getItem('dadosSimulacaoEdicao');

        if (dadosSalvos) {
          const dados = JSON.parse(dadosSalvos);

          const inputSalario = document.getElementById('salario');
          const inputOutras = document.getElementById('outras');

          if (dados.renda.toLowerCase() === 'clt' || dados.renda.toLowerCase() === 'contrato') {
            if (inputSalario) {

              inputSalario.value = formatarValorParaInput(dados.valor);
            }
          } else {

            if (inputOutras) {
              inputOutras.value = formatarValorParaInput(dados.valor);
            }
          }

          localStorage.removeItem('dadosSimulacaoEdicao');
        }
      });

      function formatarValorParaInput(valorStr) {
        if (!valorStr) return "R$ 0,00";
        let numero = parseFloat(valorStr);
        if (isNaN(numero)) return valorStr;
        
        return numero.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      }
    </script>
  </body>
</html>
